<!doctype html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Cloud-gaming</title>
      <link rel="stylesheet" href="../styles/nav.css">
      <link rel="stylesheet" href="../styles/footer.css">
      <link rel="stylesheet" href="../styles/index.css">
      <link rel="stylesheet" href="../styles/cloud-gaming-page.css">
      <style >
          @import url("https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css");
          @import url('https://fonts.gstatic.com/s/googlesans/v58/4Ua_rENHsxJlGDuGo1OIlJfC6l_24rlCK1Yo_Iqcsih3SAyH6cAwhX9RFD48TE63OOYKtrwEIJl1pynSEg.woff2');
      </style>
</head>
<body>
<nav id="navbar">
      <p id="nav-title">GAME CENTER</p>
      <ul id="nav-items">
            <li>Home</li>
            <li>Shop</li>
            <li>Game</li>
      </ul>
      <button id="nav-login-btn">Login</button>
</nav>
<section id="cl-section-1">
      <section id="cl-section-1-img-container">

            <div class="cl-image-1-layer"></div>
            <img class="sec-1-img" src="https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80%27" alt="loading">

      </section>
      <h1>NO</h1>
      <h2>DOWNLOADS<br>DELAYS</h2>
</section>
<section id="cl-section-2">
      <h1 style="margin-left: 10px">LIVE NOW</h1>
      <hr style="margin: 20px 0 10px 0;">
      <div id="carousel">

            <div class="carousel-item active-1" ><h1>0</h1></div>
            <div class="carousel-item active-2"><h1>1</h1></div>
            <div class="carousel-item active-3"><h1>2</h1></div>

           <button class=" btn arrow-btn-left" data-name="left">&larr;</button>
           <button class=" btn arrow-btn-right" data-name="right">&rarr;</button>
      </div>
      <h1 style="margin-left: 10px"> DEPLOYING SOON </h1>
      <hr  style="margin: 20px 0 10px 0;">
      <div class="soon-grid">
            <div class="grid-item">g-1</div>
            <div class="grid-item">g-2</div>
            <div class="grid-item">g-3</div>
            <div class="grid-item">g-4</div>
            <div class="grid-item">g-5</div>
            <div class="grid-item">g-6</div>
      </div>
</section>

<footer id="footer-2"></footer>
</body>
<script>
const carouselCards = document.querySelectorAll(".carousel-item");
const button = document.querySelectorAll(".btn");

function changeCard(activeCard){
    carouselCards.forEach((e,i)=>{
        e.style.display = activeCard === i? "block":"none";
    })
}
changeCard(0);
let currentIndex = 0;
button.forEach((e)=>{
    e.addEventListener('click',()=>{
        switch(e.dataset.name){
            case "left":
                changeCard((currentIndex = currentIndex - 1 + carouselCards.length ) % carouselCards.length);
                break;
            case "right":
                changeCard((currentIndex = currentIndex + 1) % carouselCards.length);
                break;
        }
    })
})


</script>
</html>
